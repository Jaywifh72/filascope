        <section>
          <h2>Frequently Asked Questions</h2>
          <dl>
            <dt><strong>What is FilaScope?</strong></dt>
            <dd>FilaScope is a free 3D printer filament comparison platform that indexes 1,080+ filaments from 48+ brands with real-time pricing from 15+ retailers worldwide. It features the largest public HueForge TD database, detailed material specifications, printer compatibility data, and FilaScore quality ratings.</dd>
            <dt><strong>What is HueForge TD?</strong></dt>
            <dd>HueForge TD (Transmission Distance) measures how much light passes through a filament at a given thickness, in millimeters. Low TD means opaque; high TD means translucent. It is essential for creating lithophanes and multicolor HueForge prints. FilaScope tracks TD values for 1,000+ filaments.</dd>
            <dt><strong>What is the best PLA filament?</strong></dt>
            <dd>According to FilaScope's database, top-rated PLA filaments include Prusament PLA (tight tolerances), Bambu Lab PLA Basic (high-speed optimized), and Polymaker PolyTerra PLA (eco-friendly with wide color range). The best choice depends on your printer and project needs.</dd>
            <dt><strong>PLA vs PETG — which should I use?</strong></dt>
            <dd>PLA prints at 190-220°C with no heated bed required and is best for decorative prints. PETG prints at 220-250°C and offers better strength, heat resistance (~80°C vs ~60°C), and chemical resistance. Choose PLA for ease, PETG for functional parts.</dd>
            <dt><strong>What temperature should I print filament at?</strong></dt>
            <dd>Each filament type has a specific temperature range. PLA: 190-220°C nozzle, 50-60°C bed. PETG: 230-250°C nozzle, 70-85°C bed. ABS: 230-260°C nozzle, 90-110°C bed. TPU: 220-250°C nozzle, 40-60°C bed. See our complete <a href="/filament-temperature-chart" style="color:#22d3ee;">filament temperature chart</a> for 25+ materials.</dd>
            <dt><strong>What is the difference between PETG and TPU?</strong></dt>
            <dd>PETG is a rigid, strong thermoplastic ideal for functional parts with good heat resistance (~80°C). TPU is a flexible, rubber-like material perfect for phone cases, gaskets, and vibration dampening. PETG is easier to print on any printer; TPU requires a direct-drive extruder and slow print speeds.</dd>
          </dl>
