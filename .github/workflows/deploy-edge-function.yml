name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Edge function name to deploy'
        required: true
        default: 'sync-amazon-prices'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Debug Info
        run: |
          echo "=== DEBUG INFO ==="
          echo "Function name: ${{ github.event.inputs.function_name }}"
          echo "SUPABASE_ACCESS_TOKEN set: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}"
          echo "Token prefix: $(echo '${{ secrets.SUPABASE_ACCESS_TOKEN }}' | head -c 10)"
          echo "Project ref: fytxfdvbzstnimzhjgth"
          echo "=== CHECKING FILE ==="
          ls -la supabase/functions/${{ github.event.inputs.function_name }}/ || echo "Function dir not found"
          echo "=== DEPLOY COMMAND ==="
          supabase functions deploy ${{ github.event.inputs.function_name }} --project-ref fytxfdvbzstnimzhjgth --no-verify-jwt 2>&1
          echo "Exit code: $?"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
