name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Edge function name to deploy'
        required: true
        default: 'sync-amazon-prices'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          supabase functions deploy ${{ github.event.inputs.function_name }} --project-ref fytxfdvbzstnimzhjgth --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
