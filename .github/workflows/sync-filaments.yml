name: Daily Filament Data Sync - Complete Coverage

on:
  schedule:
    - cron: '0 2 * * *'  # SpoolmanDB sync at 2 AM UTC
    - cron: '0 3 * * *'  # Daily brand scraping at 3 AM UTC
    - cron: '0 1 * * 0'  # Weekly FULL discovery on Sundays at 1 AM UTC
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sync-spoolman
          - scrape-shopify
          - scrape-amazon
          - scrape-other
      brand:
        description: 'Specific brand (leave empty for all in selected job)'
        required: false
        type: string
      dry_run:
        description: 'Dry run mode'
        required: false
        default: false
        type: boolean
      full_discovery:
        description: 'Full discovery mode (higher limit, auto-create enabled)'
        required: false
        default: false
        type: boolean

jobs:
  sync-spoolman:
    name: Sync SpoolmanDB
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'sync-spoolman'
    steps:
      - name: Trigger SpoolmanDB Sync
        run: |
          echo "🚀 Starting SpoolmanDB sync..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/sync-filaments" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"scheduled": true}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ SpoolmanDB sync failed"
            exit 1
          fi
          
          echo "✅ SpoolmanDB sync completed"

  scrape-shopify:
    name: Scrape Shopify Brands
    runs-on: ubuntu-latest
    needs: [sync-spoolman]
    if: always() && (github.event.schedule == '0 3 * * *' || github.event.schedule == '0 1 * * 0' || github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape-shopify')
    
    strategy:
      matrix:
        brand: [
          # SHOPIFY BRANDS (27 total)
          'Prusament',
          '3D-Fuel',
          'Polymaker',
          'ColorFabb',
          'Proto-Pasta',
          'Fillamentum',
          'Atomic Filament',
          'Push Plastic',
          'Fusion Filaments',
          'NinjaTek',
          'Recreus',
          'Extrudr',
          'Fiberlogy',
          'Ultimaker',
          'Printed Solid',
          'Bambu Lab',
          'Anycubic',
          'Elegoo',
          'Creality',
          'Sunlu',
          'Amolen',
          'eSun',
          'Eryone',
          'VoxelPLA',
          'Matter3D',
          'Taulman3D',
          'Siraya Tech'
        ]
      max-parallel: 5
      fail-fast: false
    
    steps:
      - name: Scrape ${{ matrix.brand }}
        id: scrape
        run: |
          BRAND="${{ github.event.inputs.brand }}"
          if [ -z "$BRAND" ]; then
            BRAND="${{ matrix.brand }}"
          fi
          
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          # Use higher limit for weekly full discovery or manual full_discovery
          IS_WEEKLY="${{ github.event.schedule == '0 1 * * 0' }}"
          IS_FULL="${{ github.event.inputs.full_discovery || 'false' }}"
          
          if [ "$IS_WEEKLY" == "true" ] || [ "$IS_FULL" == "true" ]; then
            LIMIT=200
            echo "🔍 FULL DISCOVERY: Scraping $BRAND (Shopify) with limit $LIMIT..."
          else
            LIMIT=100
            echo "🔍 Scraping $BRAND (Shopify) with limit $LIMIT..."
          fi
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-brand-data" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"vendor\": \"$BRAND\", \"limit\": $LIMIT, \"dryRun\": $DRY_RUN}")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          
          # Parse creation stats from response
          CREATED=$(echo "$body" | jq -r '.results.stats.created // .stats.created // 0' 2>/dev/null || echo "0")
          UPDATED=$(echo "$body" | jq -r '.results.stats.updated // .stats.updated // 0' 2>/dev/null || echo "0")
          TOTAL=$(echo "$body" | jq -r '.results.stats.total // .stats.total // 0' 2>/dev/null || echo "0")
          
          echo "📊 Stats - Created: $CREATED, Updated: $UPDATED, Total: $TOTAL"
          
          # Set outputs for summary
          echo "brand=$BRAND" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Failed to scrape $BRAND"
            echo "::warning::Brand $BRAND scraping failed"
            exit 1
          fi
          
          echo "✅ Successfully scraped $BRAND (Created: $CREATED, Updated: $UPDATED)"

  scrape-amazon:
    name: Scrape Amazon Brands
    runs-on: ubuntu-latest
    needs: [scrape-shopify]
    if: always() && (github.event.schedule == '0 3 * * *' || github.event.schedule == '0 1 * * 0' || github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape-amazon')
    
    strategy:
      matrix:
        brand: [
          # AMAZON BRANDS (10 total)
          'Hatchbox',
          'Ziro',
          'Paramount 3D',
          'GEEETECH',
          'TECBEARS',
          'TTYT3D',
          'CC3D',
          '3D Solutech',
          'Gizmo Dorks',
          'PRILINE'
        ]
      max-parallel: 1  # Serial for Amazon rate limits
      fail-fast: false
    
    steps:
      - name: Scrape ${{ matrix.brand }} (Amazon)
        id: scrape
        run: |
          BRAND="${{ github.event.inputs.brand }}"
          if [ -z "$BRAND" ]; then
            BRAND="${{ matrix.brand }}"
          fi
          
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          # Use higher limit for weekly full discovery
          IS_WEEKLY="${{ github.event.schedule == '0 1 * * 0' }}"
          IS_FULL="${{ github.event.inputs.full_discovery || 'false' }}"
          
          if [ "$IS_WEEKLY" == "true" ] || [ "$IS_FULL" == "true" ]; then
            LIMIT=150
            echo "🔍 FULL DISCOVERY: Scraping $BRAND via Amazon with limit $LIMIT..."
          else
            LIMIT=100
            echo "🔍 Scraping $BRAND via Amazon with limit $LIMIT..."
          fi
          
          # Respect Amazon rate limits
          sleep 2
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-brand-data" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"vendor\": \"$BRAND\", \"limit\": $LIMIT, \"dryRun\": $DRY_RUN}")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          
          # Parse creation stats
          CREATED=$(echo "$body" | jq -r '.results.stats.created // .stats.created // 0' 2>/dev/null || echo "0")
          UPDATED=$(echo "$body" | jq -r '.results.stats.updated // .stats.updated // 0' 2>/dev/null || echo "0")
          
          echo "📊 Stats - Created: $CREATED, Updated: $UPDATED"
          echo "brand=$BRAND" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          
          if [ "$http_code" -ne 200 ]; then
            echo "⚠️ $BRAND scrape may have failed (Amazon is rate-limited)"
            echo "::warning::Amazon brand $BRAND scraping failed"
          else
            echo "✅ Successfully scraped $BRAND (Created: $CREATED, Updated: $UPDATED)"
          fi

  scrape-other:
    name: Scrape Other Platforms
    runs-on: ubuntu-latest
    needs: [scrape-amazon]
    if: always() && (github.event.schedule == '0 3 * * *' || github.event.schedule == '0 1 * * 0' || github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape-other')
    
    strategy:
      matrix:
        brand: [
          # WOOCOMMERCE (1)
          'Overture 3D',
          # BIGCOMMERCE (1)
          '3DXTech',
          # FIRECRAWL/CUSTOM (3)
          'FormFutura',
          'MatterHackers',
          'Inland'
        ]
      max-parallel: 2
      fail-fast: false
    
    steps:
      - name: Scrape ${{ matrix.brand }}
        id: scrape
        run: |
          BRAND="${{ github.event.inputs.brand }}"
          if [ -z "$BRAND" ]; then
            BRAND="${{ matrix.brand }}"
          fi
          
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          # Use higher limit for weekly full discovery
          IS_WEEKLY="${{ github.event.schedule == '0 1 * * 0' }}"
          IS_FULL="${{ github.event.inputs.full_discovery || 'false' }}"
          
          if [ "$IS_WEEKLY" == "true" ] || [ "$IS_FULL" == "true" ]; then
            LIMIT=200
            echo "🔍 FULL DISCOVERY: Scraping $BRAND with limit $LIMIT..."
          else
            LIMIT=100
            echo "🔍 Scraping $BRAND (Custom/WooCommerce/BigCommerce) with limit $LIMIT..."
          fi
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-brand-data" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"vendor\": \"$BRAND\", \"limit\": $LIMIT, \"dryRun\": $DRY_RUN}")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          
          # Parse creation stats
          CREATED=$(echo "$body" | jq -r '.results.stats.created // .stats.created // 0' 2>/dev/null || echo "0")
          UPDATED=$(echo "$body" | jq -r '.results.stats.updated // .stats.updated // 0' 2>/dev/null || echo "0")
          
          echo "📊 Stats - Created: $CREATED, Updated: $UPDATED"
          echo "brand=$BRAND" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Failed to scrape $BRAND"
            echo "::warning::Brand $BRAND scraping failed"
            exit 1
          fi
          
          echo "✅ Successfully scraped $BRAND (Created: $CREATED, Updated: $UPDATED)"

  sync-regional-prices:
    name: Sync Regional Prices
    runs-on: ubuntu-latest
    # Only run on weekly schedule (Sundays)
    if: github.event.schedule == '0 1 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'regional-prices')
    
    strategy:
      fail-fast: false
      max-parallel: 2
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    
    steps:
      - name: Sync Bambu Lab regional prices
        run: |
          echo "🌍 Syncing Bambu Lab regional prices..."
          curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/functions/v1/sync-regional-prices" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"brandSlug":"bambu-lab","regions":["EU","UK","CA","AU","JP"],"dryRun":false}'
          
      - name: Sync Elegoo regional prices
        run: |
          echo "🌍 Syncing Elegoo regional prices..."
          curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/functions/v1/sync-regional-prices" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"brandSlug":"elegoo","regions":["EU","UK","CA","AU"],"dryRun":false}'
          
      - name: Sync Polymaker regional prices
        run: |
          echo "🌍 Syncing Polymaker regional prices..."
          curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/functions/v1/sync-regional-prices" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"brandSlug":"polymaker","regions":["EU"],"dryRun":false}'
          
      - name: Sync Creality regional prices
        run: |
          echo "🌍 Syncing Creality regional prices..."
          curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/functions/v1/sync-regional-prices" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"brandSlug":"creality","regions":["EU","UK","CA","AU"],"dryRun":false}'
          
      - name: Sync Anycubic regional prices
        run: |
          echo "🌍 Syncing Anycubic regional prices..."
          curl -sS -w "\n%{http_code}" \
            "$SUPABASE_URL/functions/v1/sync-regional-prices" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"brandSlug":"anycubic","regions":["EU","UK","CA","AU"],"dryRun":false}'

  # Weekly image scraping job
  scrape-images:
    name: Scrape Images - ${{ matrix.brand }}
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape-images')
    strategy:
      max-parallel: 2
      matrix:
        brand: ['ninjatek', 'matterhackers', 'tecbears', 'fillamentum', 'eryone']
    steps:
      - name: Discover images for ${{ matrix.brand }}
        run: |
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/discover-brand-images" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"brand": "${{ matrix.brand }}", "dryRun": false, "limit": 100}'

  summary:
    name: Generate Summary Report
    runs-on: ubuntu-latest
    needs: [sync-spoolman, scrape-shopify, scrape-amazon, scrape-other, sync-regional-prices, scrape-images]
    if: always()
    
    steps:
      - name: Fetch sync stats from database
        id: fetch-stats
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          STATS=$(curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/brand_sync_logs?started_at=gte.${TODAY}T00:00:00Z&select=brand_slug,products_created,products_updated,products_discovered,status" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          TOTAL_CREATED=$(echo "$STATS" | jq '[.[].products_created // 0] | add // 0')
          TOTAL_UPDATED=$(echo "$STATS" | jq '[.[].products_updated // 0] | add // 0')
          SUCCESS_COUNT=$(echo "$STATS" | jq '[.[] | select(.status == "completed")] | length')
          FAILED_COUNT=$(echo "$STATS" | jq '[.[] | select(.status == "failed")] | length')
          
          echo "total_created=$TOTAL_CREATED" >> $GITHUB_OUTPUT
          echo "total_updated=$TOTAL_UPDATED" >> $GITHUB_OUTPUT
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
      
      - name: Create summary
        run: |
          echo "## 📊 Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Products Created | ${{ steps.fetch-stats.outputs.total_created || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Products Updated | ${{ steps.fetch-stats.outputs.total_updated || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Successful | ${{ steps.fetch-stats.outputs.success_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.fetch-stats.outputs.failed_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- sync-spoolman: ${{ needs.sync-spoolman.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- scrape-shopify: ${{ needs.scrape-shopify.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- scrape-amazon: ${{ needs.scrape-amazon.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- scrape-other: ${{ needs.scrape-other.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- sync-regional-prices: ${{ needs.sync-regional-prices.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- scrape-images: ${{ needs.scrape-images.result }}" >> $GITHUB_STEP_SUMMARY
