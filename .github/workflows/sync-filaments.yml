name: Sync Filaments Daily

on:
  schedule:
    - cron: '0 2 * * *'  # SpoolmanDB sync at 2 AM UTC
    - cron: '0 3 * * *'  # Brand scraping at 3 AM UTC
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sync-spoolman
          - scrape-brands

jobs:
  sync-spoolman:
    name: Sync SpoolmanDB
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'sync-spoolman'
    steps:
      - name: Trigger SpoolmanDB Sync
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_FUNCTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"

  scrape-brands:
    name: Scrape Brand Websites
    runs-on: ubuntu-latest
    needs: [sync-spoolman]
    if: always() && (github.event.schedule == '0 3 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape-brands')
    
    strategy:
      matrix:
        brand: [
          'Prusament',
          'Overture 3D',
          '3D-Fuel',
          '3DXTech',
          'Bambu Lab',
          'Polymaker',
          'eSUN',
          'Sunlu',
          'Amolen',
          'Anycubic',
          'Eryone',
          'Elegoo',
          'Creality',
          'TTYT3D',
          'ColorFabb',
          'Fiberlogy',
          'Ultimaker',
          'Printed Solid',
          'Push Plastic',
          'Fusion Filaments',
          'Ziro',
          'Paramount 3D',
          'Inland',
          'Taulman3D',
          'FormFutura',
          'MatterHackers',
          'Matter3D',
          'Siraya Tech',
          'Atomic Filament',
          'Proto-Pasta',
          'VoxelPLA',
          'NinjaTek',
          'Fillamentum'
        ]
      max-parallel: 3
      fail-fast: false
    
    steps:
      - name: Scrape ${{ matrix.brand }}
        run: |
          echo "🔍 Scraping ${{ matrix.brand }}..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-brand-data" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"vendor": "${{ matrix.brand }}", "limit": 100}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          echo "Response body: $body"
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Failed to scrape ${{ matrix.brand }}"
            exit 1
          fi
          
          echo "✅ Successfully scraped ${{ matrix.brand }}"

  scrape-amazon:
    name: Scrape Amazon Brands
    runs-on: ubuntu-latest
    needs: [scrape-brands]
    if: always() && (github.event.schedule == '0 3 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape-brands')
    
    strategy:
      matrix:
        brand: [
          'Hatchbox',
          'Ziro',
          'Paramount 3D',
          'Inland',
          'GEEETECH',
          'TECBEARS',
          'TTYT3D',
          'CC3D',
          '3D Solutech',
          'Gizmo Dorks',
          'PRILINE'
        ]
      max-parallel: 1
      fail-fast: false
    
    steps:
      - name: Scrape ${{ matrix.brand }} (Amazon)
        run: |
          echo "🔍 Scraping ${{ matrix.brand }} via Amazon..."
          # Add 2 second delay between brands to respect rate limits
          sleep 2
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-brand-data" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"vendor": "${{ matrix.brand }}", "limit": 100}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response code: $http_code"
          echo "Response body: $body"
          
          if [ "$http_code" -ne 200 ]; then
            echo "⚠️ ${{ matrix.brand }} scrape may have failed (Amazon is rate-limited)"
          else
            echo "✅ Successfully scraped ${{ matrix.brand }}"
          fi
